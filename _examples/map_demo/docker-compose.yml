version: '3.8'

services:
  redis:
    image: redis:7
    container_name: map_broker_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: map_demo_postgres
    environment:
      POSTGRES_USER: centrifuge
      POSTGRES_PASSWORD: centrifuge
      POSTGRES_DB: centrifuge
    ports:
      - "5432:5432"
    volumes:
      - map_broker_data:/var/lib/postgresql/data
    command:
      - "postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centrifuge -d centrifuge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  map_broker_data:
